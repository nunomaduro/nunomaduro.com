name: Tests

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Tests
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Cargo check
      uses: actions-rs/cargo@e3a1fd1d1e16e6d43f7d1f64b7b0f994d51f5c4f
      with:
        command: check
        args: --workspace --all-targets --all

  coding-style:
    name: Coding Style
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    - name: Install clippy
      run: rustup component add clippy
    - name: Run linter (clippy)
      run: cargo clippy
